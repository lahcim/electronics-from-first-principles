<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 21 — Reverse-polarity protection choices</text><rect x="80" y="130" width="230" height="100" class="w"/><text x="120" y="185" font-size="22">Series diode</text><rect x="420" y="130" width="230" height="100" class="w"/><text x="455" y="185" font-size="22">Shunt + fuse</text><rect x="760" y="130" width="230" height="100" class="w"/><text x="800" y="185" font-size="22">MOSFET</text><text x="110" y="330" font-size="20">simple, continuous drop</text><text x="445" y="330" font-size="20">fault must clear safely</text><text x="790" y="330" font-size="20">low loss, more design care</text><text x="210" y="455" font-size="22">Always verify reverse input, normal loss, backfeed, and stored output energy</text></svg>