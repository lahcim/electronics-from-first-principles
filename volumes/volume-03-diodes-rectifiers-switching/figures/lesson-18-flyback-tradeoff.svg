<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.t{stroke:#111;stroke-width:2;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 18 — Clamp voltage trades switch stress for release speed</text><path class="w" d="M100 130 L100 400 L900 400"/><path class="w" d="M100 150 C250 170 500 270 900 390"/><path class="w" d="M100 150 C180 220 260 330 360 390"/><text x="650" y="270" font-size="22">plain diode: slow decay</text><text x="270" y="250" font-size="22">higher clamp: fast decay</text><text x="310" y="470" font-size="22">higher voltage → faster current fall → more switch stress</text></svg>