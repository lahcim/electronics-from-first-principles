<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 27 — Diode technology tradeoffs</text><rect x="60" y="140" width="280" height="180" class="w"/><text x="130" y="190" font-size="23">Silicon Schottky</text><text x="95" y="235" font-size="19">low Vf, high leakage</text><text x="100" y="270" font-size="19">best at lower voltage</text><rect x="400" y="140" width="280" height="180" class="w"/><text x="470" y="190" font-size="23">Fast silicon PN</text><text x="445" y="235" font-size="19">cost effective, Qrr</text><text x="450" y="270" font-size="19">softness matters</text><rect x="740" y="140" width="280" height="180" class="w"/><text x="815" y="190" font-size="23">SiC Schottky</text><text x="790" y="235" font-size="19">high voltage, low Qrr</text><text x="790" y="270" font-size="19">higher cost, C remains</text><text x="250" y="430" font-size="22">Compare at actual current, voltage, frequency, and temperature</text></svg>