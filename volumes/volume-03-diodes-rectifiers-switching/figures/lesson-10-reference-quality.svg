<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 10 — Reference quality is multidimensional</text><circle cx="540" cy="260" r="90" class="w"/><text x="490" y="270" font-size="24">VREF</text><text x="120" y="150" font-size="22">initial tolerance</text><text x="120" y="390" font-size="22">noise</text><text x="780" y="150" font-size="22">temperature drift</text><text x="780" y="390" font-size="22">dynamic impedance</text><text x="400" y="470" font-size="22">also: aging, self-heating, current range</text></svg>