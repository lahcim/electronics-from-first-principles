<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 9 — Zener corner analysis</text><rect x="90" y="130" width="390" height="130" class="w"/><text x="135" y="180" font-size="22">Low line + max load</text><text x="135" y="220" font-size="20">controls minimum Zener current</text><rect x="600" y="130" width="390" height="130" class="w"/><text x="650" y="180" font-size="22">High line + min load</text><text x="650" y="220" font-size="20">controls maximum Zener power</text><text x="210" y="410" font-size="22">A valid resistor must satisfy both corners with tolerance and temperature</text></svg>