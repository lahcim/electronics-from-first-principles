<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 23 — Hold-up capacitor supports the load after source loss</text><rect x="80" y="170" width="170" height="90" class="w"/><text x="125" y="220" font-size="22">Source</text><line class="w" x1="250" y1="215" x2="400" y2="215"/><polygon points="400,190 450,215 400,240" fill="none" stroke="#111" stroke-width="4"/><line class="w" x1="455" y1="190" x2="455" y2="240"/><line class="w" x1="455" y1="215" x2="720" y2="215"/><rect x="720" y="170" width="180" height="90" class="w"/><text x="770" y="220" font-size="22">Load</text><line class="w" x1="590" y1="215" x2="590" y2="320"/><line class="w" x1="560" y1="320" x2="620" y2="320"/><line class="w" x1="560" y1="355" x2="620" y2="355"/><line class="w" x1="590" y1="355" x2="590" y2="430"/><text x="640" y="345" font-size="22">hold-up capacitor</text><text x="200" y="470" font-size="22">Isolation prevents the stored energy from flowing back into the failed source</text></svg>