<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="540"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.t{stroke:#111;stroke-width:2;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 38 — Design margin must survive aging</text><line class="t" x1="90" y1="430" x2="1000" y2="430"/><line class="t" x1="90" y1="430" x2="90" y2="100"/><path class="w" d="M100 150 C300 170 500 220 900 340"/><path class="w" d="M100 360 C320 330 560 270 900 190"/><text x="120" y="135" font-size="21">capacitance / performance margin falls</text><text x="120" y="390" font-size="21">ESR / loss rises</text><line class="t" x1="90" y1="300" x2="1000" y2="300"/><text x="820" y="290" font-size="20">minimum acceptable margin</text><text x="430" y="485" font-size="22">new → temperature and stress → end of life</text></svg>