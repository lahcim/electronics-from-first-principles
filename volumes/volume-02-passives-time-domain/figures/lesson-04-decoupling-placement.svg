<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="560"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.bad{stroke:#b00020;stroke-width:4;fill:none}.good{stroke:#087f23;stroke-width:4;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 4 — Decoupling placement changes the current loop</text><rect x="80" y="120" width="250" height="180" class="w"/><text x="170" y="215" font-size="28">IC</text><circle cx="330" cy="165" r="7" fill="#111"/><circle cx="330" cy="255" r="7" fill="#111"/><text x="345" y="170" font-size="20">VDD</text><text x="345" y="260" font-size="20">GND</text><line x1="330" y1="165" x2="500" y2="165" class="good"/><line x1="500" y1="165" x2="500" y2="215" class="good"/><line x1="475" y1="215" x2="525" y2="215" class="good"/><line x1="475" y1="245" x2="525" y2="245" class="good"/><line x1="500" y1="245" x2="500" y2="255" class="good"/><line x1="500" y1="255" x2="330" y2="255" class="good"/><text x="445" y="105" font-size="22" fill="#087f23">Good: short local loop</text><line x1="330" y1="165" x2="820" y2="165" class="bad"/><line x1="820" y1="165" x2="820" y2="315" class="bad"/><line x1="795" y1="315" x2="845" y2="315" class="bad"/><line x1="795" y1="345" x2="845" y2="345" class="bad"/><line x1="820" y1="345" x2="820" y2="430" class="bad"/><line x1="820" y1="430" x2="330" y2="430" class="bad"/><line x1="330" y1="430" x2="330" y2="255" class="bad"/><text x="690" y="485" font-size="22" fill="#b00020">Bad: long inductive loop</text><text x="385" y="535" font-size="22">Same capacitance, very different high-frequency performance</text></svg>