<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.a{stroke:#111;stroke-width:3;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker></defs><text x="35" y="45" font-size="28" font-weight="bold">Lesson 35 — Validate a model before trusting it</text><rect x="70" y="160" width="180" height="90" class="w"/><text x="105" y="210" font-size="22">Vendor model</text><line x1="250" y1="205" x2="350" y2="205" class="a"/><rect x="350" y="160" width="190" height="90" class="w"/><text x="380" y="195" font-size="22">Pin mapping</text><text x="390" y="225" font-size="18">and syntax</text><line x1="540" y1="205" x2="640" y2="205" class="a"/><rect x="640" y="160" width="190" height="90" class="w"/><text x="675" y="195" font-size="22">Test fixture</text><text x="665" y="225" font-size="18">DC / AC / transient</text><line x1="830" y1="205" x2="930" y2="205" class="a"/><rect x="930" y="160" width="150" height="90" class="w"/><text x="955" y="212" font-size="22">Datasheet</text><line x1="1005" y1="250" x2="1005" y2="365" class="a"/><rect x="820" y="365" width="260" height="90" class="w"/><text x="860" y="405" font-size="22">Use in full circuit</text><text x="845" y="435" font-size="18">only after validation</text><text x="150" y="440" font-size="21">Simplest model that answers the question is usually best</text></svg>