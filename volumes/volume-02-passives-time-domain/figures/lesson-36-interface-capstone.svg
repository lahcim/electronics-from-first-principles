<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.a{stroke:#111;stroke-width:3;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker></defs><text x="35" y="45" font-size="28" font-weight="bold">Lesson 36 — Passive interface from driver to receiver</text><rect x="50" y="170" width="160" height="90" class="w"/><text x="95" y="220" font-size="22">Driver</text><line x1="210" y1="215" x2="320" y2="215" class="a"/><rect x="320" y="150" width="190" height="130" class="w"/><text x="355" y="195" font-size="22">Termination</text><text x="350" y="230" font-size="18">+ EMI filter</text><line x1="510" y1="215" x2="650" y2="215" class="a"/><rect x="650" y="150" width="180" height="130" class="w"/><text x="700" y="195" font-size="22">Cable</text><text x="680" y="230" font-size="18">Z0 + delay</text><line x1="830" y1="215" x2="940" y2="215" class="a"/><rect x="940" y="170" width="140" height="90" class="w"/><text x="970" y="220" font-size="22">Receiver</text><text x="115" y="380" font-size="21">Verify reflections, rise time, differential noise, common-mode noise, and probe loading</text><text x="220" y="445" font-size="21">Every passive part must have a defined signal-integrity or noise-return purpose</text></svg>