<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.t{stroke:#111;stroke-width:2;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 30 — Thermal behavior maps to an RC network</text><circle class="w" cx="180" cy="250" r="55"/><text x="145" y="258" font-size="22">Power</text><line class="w" x1="235" y1="250" x2="400" y2="250"/><polyline class="w" points="400,250 425,230 455,270 485,230 515,270 540,250"/><text x="425" y="205" font-size="22">Rth</text><line class="w" x1="540" y1="250" x2="720" y2="250"/><line class="w" x1="720" y1="250" x2="720" y2="340"/><line class="w" x1="690" y1="340" x2="750" y2="340"/><line class="w" x1="690" y1="375" x2="750" y2="375"/><line class="w" x1="720" y1="375" x2="720" y2="430"/><text x="765" y="365" font-size="22">Cth</text><text x="370" y="470" font-size="22">Temperature rise behaves like capacitor voltage: τth = Rth·Cth</text></svg>