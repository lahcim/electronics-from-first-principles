<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.a{stroke:#111;stroke-width:3;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker></defs><text x="35" y="45" font-size="28" font-weight="bold">Lesson 16 — Passive transient design capstone</text><rect x="60" y="140" width="210" height="100" class="w"/><text x="105" y="185" font-size="22">12 V input</text><text x="90" y="220" font-size="19">regulator + bulk C</text><line x1="270" y1="190" x2="410" y2="190" class="a"/><rect x="410" y="140" width="220" height="100" class="w"/><text x="475" y="185" font-size="22">3.3 V MCU</text><text x="455" y="220" font-size="19">local decoupling</text><line x1="520" y1="240" x2="520" y2="350" class="a"/><rect x="400" y="350" width="240" height="100" class="w"/><text x="455" y="395" font-size="22">Button input</text><text x="440" y="430" font-size="19">RC + Schmitt behavior</text><line x1="630" y1="190" x2="800" y2="190" class="a"/><rect x="800" y="130" width="250" height="120" class="w"/><text x="850" y="175" font-size="22">Relay driver</text><text x="830" y="210" font-size="19">coil energy + clamp</text><text x="110" y="330" font-size="21">Three questions:</text><text x="110" y="370" font-size="19">1. Who supplies current first?</text><text x="110" y="405" font-size="19">2. Which threshold sets timing?</text><text x="110" y="440" font-size="19">3. Where does stored energy go?</text><text x="695" y="410" font-size="21">Verify droop, delay, VDS, current decay, and energy</text></svg>