<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.a{stroke:#111;stroke-width:3;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker></defs><text x="35" y="45" font-size="28" font-weight="bold">Lesson 25 — Charge sharing conserves charge, not stored capacitor energy</text><line class="w" x1="150" y1="150" x2="150" y2="250"/><line class="w" x1="110" y1="250" x2="190" y2="250"/><line class="w" x1="110" y1="285" x2="190" y2="285"/><line class="w" x1="150" y1="285" x2="150" y2="390"/><text x="80" y="330" font-size="22">C1 at V1</text><line class="w" x1="820" y1="150" x2="820" y2="250"/><line class="w" x1="780" y1="250" x2="860" y2="250"/><line class="w" x1="780" y1="285" x2="860" y2="285"/><line class="w" x1="820" y1="285" x2="820" y2="390"/><text x="765" y="330" font-size="22">C2 at 0 V</text><line class="w" x1="150" y1="150" x2="420" y2="150"/><rect x="420" y="125" width="100" height="50" class="w"/><text x="447" y="158" font-size="20">switch</text><line class="w" x1="520" y1="150" x2="820" y2="150"/><line class="w" x1="150" y1="390" x2="820" y2="390"/><path class="a" d="M300 210 C430 250 540 250 680 210"/><text x="380" y="285" font-size="22">current pulse dissipates energy in real parasitics</text><text x="290" y="460" font-size="22">Final voltage comes from charge conservation; missing energy becomes heat or radiation</text></svg>