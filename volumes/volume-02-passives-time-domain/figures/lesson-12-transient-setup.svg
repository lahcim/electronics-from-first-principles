<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 12 — Initial condition changes the entire transient</text><path class="w" d="M80 420 C220 420 250 120 500 120"/><path class="w" d="M80 300 C220 300 260 120 500 120"/><line class="w" x1="80" y1="120" x2="500" y2="120"/><text x="520" y="128" font-size="22">5 V final</text><text x="95" y="455" font-size="21">startup from 0 V</text><text x="95" y="335" font-size="21">IC = 2 V</text><text x="95" y="100" font-size="21">DC operating point: already at 5 V</text><line class="w" x1="650" y1="100" x2="650" y2="430"/><line class="w" x1="650" y1="430" x2="980" y2="430"/><text x="690" y="165" font-size="21">Define:</text><text x="690" y="205" font-size="20">• past state</text><text x="690" y="240" font-size="20">• stop time</text><text x="690" y="275" font-size="20">• max timestep</text><text x="690" y="310" font-size="20">• pass/fail measurements</text></svg>