<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial,sans-serif;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.thin{stroke:#111;stroke-width:2;fill:none}.node{fill:#111}</style><text x="40" y="48" font-size="30" font-weight="bold">Volume 2, Lesson 1 — RC charging and capacitor energy</text><circle class="w" cx="190" cy="310" r="55"/><text x="218" y="297" font-size="26">+</text><text x="218" y="342" font-size="26">−</text><text x="60" y="316" font-size="24">V1</text><text x="48" y="350" font-size="20">PULSE 0→5 V</text><line class="w" x1="190" y1="255" x2="190" y2="130"/><line class="w" x1="190" y1="130" x2="390" y2="130"/><polyline class="w" points="390,130 415,108 445,152 475,108 505,152 535,108 565,130"/><text x="425" y="86" font-size="24">R1 = 1 kΩ</text><line class="w" x1="565" y1="130" x2="730" y2="130"/><circle class="node" cx="730" cy="130" r="7"/><text x="748" y="122" font-size="24">VCAP</text><line class="w" x1="730" y1="130" x2="730" y2="270"/><line class="w" x1="685" y1="270" x2="775" y2="270"/><line class="w" x1="685" y1="305" x2="775" y2="305"/><line class="w" x1="730" y1="305" x2="730" y2="455"/><text x="795" y="292" font-size="24">C1 = 1 µF</text><line class="w" x1="730" y1="455" x2="190" y2="455"/><line class="w" x1="190" y1="455" x2="190" y2="365"/><line class="thin" x1="450" y1="180" x2="560" y2="180"/><polyline class="thin" points="550,170 560,180 550,190"/><text x="430" y="215" font-size="21">charging current</text><line class="thin" x1="830" y1="250" x2="830" y2="150"/><polyline class="thin" points="820,160 830,150 840,160"/><text x="855" y="202" font-size="21">VC rises</text><text x="315" y="520" font-size="22">τ = RC = 1 ms</text><text x="315" y="555" font-size="22">Final charge: Q = CV = 5 µC</text><text x="315" y="590" font-size="22">Final stored energy: E = ½CV² = 12.5 µJ</text></svg>