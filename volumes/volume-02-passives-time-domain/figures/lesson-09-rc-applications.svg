<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:3;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">Lesson 9 — One RC network, several engineering uses</text><text x="90" y="105" font-size="23">Low-pass / smoothing</text><line class="w" x1="80" y1="150" x2="180" y2="150"/><polyline class="w" points="180,150 200,130 225,170 250,130 275,170 295,150"/><line class="w" x1="295" y1="150" x2="390" y2="150"/><line class="w" x1="390" y1="150" x2="390" y2="220"/><line class="w" x1="365" y1="220" x2="415" y2="220"/><line class="w" x1="365" y1="245" x2="415" y2="245"/><line class="w" x1="390" y1="245" x2="390" y2="280"/><text x="650" y="105" font-size="23">High-pass / coupling</text><line class="w" x1="620" y1="150" x2="700" y2="150"/><line class="w" x1="700" y1="125" x2="700" y2="175"/><line class="w" x1="730" y1="125" x2="730" y2="175"/><line class="w" x1="730" y1="150" x2="820" y2="150"/><polyline class="w" points="820,150 840,130 865,170 890,130 915,170 935,150"/><text x="120" y="360" font-size="23">Delay and debounce depend on receiver threshold</text><path class="w" d="M110 470 C220 470 260 320 430 320"/><line class="w" x1="100" y1="420" x2="460" y2="420"/><text x="500" y="425" font-size="21">threshold</text><text x="650" y="360" font-size="23">PWM smoothing trades ripple for settling time</text><path class="w" d="M650 470 L680 470 L680 390 L710 390 L710 470 L740 470 L740 390 L770 390 L770 470 L800 470"/><path class="w" d="M650 500 C710 480 760 450 820 430 C880 410 930 400 990 395"/></svg>