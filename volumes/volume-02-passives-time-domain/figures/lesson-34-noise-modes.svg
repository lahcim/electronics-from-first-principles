<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}.a{stroke:#111;stroke-width:3;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker></defs><text x="35" y="45" font-size="28" font-weight="bold">Lesson 34 — Differential and common-mode current paths</text><text x="120" y="105" font-size="23">Differential mode</text><line class="w" x1="90" y1="170" x2="450" y2="170"/><line class="w" x1="90" y1="300" x2="450" y2="300"/><path class="a" d="M140 150 L390 150"/><path class="a" d="M390 320 L140 320"/><text x="145" y="370" font-size="20">current leaves on one wire and returns on the other</text><text x="700" y="105" font-size="23">Common mode</text><line class="w" x1="650" y1="170" x2="1010" y2="170"/><line class="w" x1="650" y1="300" x2="1010" y2="300"/><path class="a" d="M700 150 L950 150"/><path class="a" d="M700 280 L950 280"/><line class="w" x1="650" y1="430" x2="1010" y2="430"/><path class="a" d="M950 390 L720 390"/><text x="705" y="475" font-size="20">both wires move together; return is through chassis/parasitics</text></svg>