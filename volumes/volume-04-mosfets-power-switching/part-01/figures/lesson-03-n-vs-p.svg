<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520"><rect width="100%" height="100%" fill="white"/><style>text{font-family:Arial;fill:#111}.w{stroke:#111;stroke-width:4;fill:none}</style><text x="35" y="45" font-size="28" font-weight="bold">N-channel and P-channel placement</text><rect x="100" y="150" width="360" height="220" class="w"/><text x="205" y="195" font-size="24">N-channel low side</text><rect x="620" y="150" width="360" height="220" class="w"/><text x="715" y="195" font-size="24">P-channel high side</text><line class="w" x1="280" y1="220" x2="280" y2="330"/><circle cx="280" cy="275" r="35" class="w"/><line class="w" x1="800" y1="220" x2="800" y2="330"/><circle cx="800" cy="275" r="35" class="w"/><text x="165" y="445" font-size="22">N-channel usually lower loss; P-channel often simpler high-side control</text></svg>